name: grafana
description: Open source analytics and interactive visualization platform
version: 10.2.2
image: docker.io/library/grafana/grafana:10.2.2
ports:
  3000: 3000
environment:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: changeme
  GF_SERVER_ROOT_URL: http://localhost:3000
volumes:
  - name: data
    path: /var/lib/grafana
  - name: provisioning
    path: /etc/grafana/provisioning
resourceLimits:
  cpu: 0.5
  memory: 256
healthCheck:
  command:
    - CMD-SHELL
    - wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1
  interval: 30
  timeout: 10
  retries: 3
  startPeriod: 30
