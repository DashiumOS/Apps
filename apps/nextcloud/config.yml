name: nextcloud
description: A safe home for all your data
version: 27.1.3
image: docker.io/library/nextcloud:27.1.3-apache
ports:
  80: 8080
environment:
  NEXTCLOUD_ADMIN_USER: admin
  NEXTCLOUD_ADMIN_PASSWORD: changeme
  NEXTCLOUD_TRUSTED_DOMAINS: localhost
volumes:
  - name: data
    path: /var/www/html
resourceLimits:
  cpu: 1.0
  memory: 512
healthCheck:
  command:
    - CMD-SHELL
    - curl -f http://localhost/status.php || exit 1
  interval: 30
  timeout: 10
  retries: 5
  startPeriod: 60
