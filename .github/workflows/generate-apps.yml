name: Generate Apps Registry

on:
  push:
    branches: [ main ]
    paths:
      - '**/config.yml'
      - '**/metadata.yml'
      - '**/icon.png'
      - '**/logo.png'
      - '**/app.png'
  pull_request:
    branches: [ main ]
    paths:
      - '**/config.yml'
      - '**/metadata.yml'
      - '**/icon.png'
      - '**/logo.png'
      - '**/app.png'
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-apps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install yq (YAML processor)
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.40.2/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        
    - name: Generate apps.json
      run: |
        chmod +x .github/scripts/generate-apps.sh
        .github/scripts/generate-apps.sh
        
    - name: Upload apps.json as artifact
      uses: actions/upload-artifact@v4
      with:
        name: apps-registry
        path: apps.json
        
    - name: Commit and create pull request
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add apps.json
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to apps.json"
        else
          # Create a new branch for the PR
          BRANCH_NAME="auto-update-apps-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "Auto-update apps.json"
          
          # Push the new branch using GITHUB_TOKEN
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "$BRANCH_NAME"
          
          # Create pull request using GitHub REST API
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d '{
              "title": "Auto-update apps.json",
              "body": "This PR automatically updates the apps.json file with changes from app configurations.",
              "head": "'"$BRANCH_NAME"'",
              "base": "main",
              "labels": ["automated-pr"]
            }'
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
